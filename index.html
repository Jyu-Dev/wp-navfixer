<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WP NavFixer - Responsive Navigation Fixer</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              black: '#000000',
              navy: '#14213d',
              orange: '#fca311',
              gray: '#e5e5e5',
              white: '#ffffff',
            }
          }
        }
      }
    }
  </script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-brand-gray text-brand-black font-sans selection:bg-brand-orange/30 selection:text-brand-navy">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline SVG Icons ---
    const Code = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
    const Smartphone = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;
    const Copy = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const CheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const AlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const Loader2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Info = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const LayoutTemplate = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="7" rx="2" ry="2"></rect><rect x="3" y="14" width="18" height="7" rx="2" ry="2"></rect></svg>;
    const ArrowRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
    const Key = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>;

    function App() {
      const [apiKey, setApiKey] = useState('');
      const [rememberMe, setRememberMe] = useState(false);
      const [htmlInput, setHtmlInput] = useState(`<nav id="site-navigation" class="main-navigation">\n  <div class="nav-wrapper">\n    <a href="/" class="site-logo">MyWP Site</a>\n    <ul id="primary-menu" class="menu">\n      <li class="menu-item"><a href="/home">Home</a></li>\n      <li class="menu-item"><a href="/about">About Us</a></li>\n      <li class="menu-item"><a href="/services">Our Services</a></li>\n      <li class="menu-item"><a href="/portfolio">Portfolio</a></li>\n      <li class="menu-item"><a href="/blog">Blog</a></li>\n      <li class="menu-item"><a href="/contact">Contact</a></li>\n    </ul>\n  </div>\n</nav>`);
      const [detectedBreakpoint, setDetectedBreakpoint] = useState(null);
      const [analysisExplanation, setAnalysisExplanation] = useState('');
      const [generatedCss, setGeneratedCss] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');
      const [copied, setCopied] = useState(false);

      // Load API Key from local storage on initial render
      useEffect(() => {
        const savedKey = localStorage.getItem('wpNavFixer_apiKey');
        if (savedKey) {
          setApiKey(savedKey);
          setRememberMe(true);
        }
      }, []);

      const handleApiKeyChange = (e) => {
        const val = e.target.value;
        setApiKey(val);
        if (rememberMe) {
          localStorage.setItem('wpNavFixer_apiKey', val);
        }
      };

      const handleRememberMeToggle = (e) => {
        const checked = e.target.checked;
        setRememberMe(checked);
        if (checked) {
          localStorage.setItem('wpNavFixer_apiKey', apiKey);
        } else {
          localStorage.removeItem('wpNavFixer_apiKey');
        }
      };

      const fetchWithRetry = async (url, options, retries = 5) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) {
              const errorData = await response.json().catch(() => ({}));
              throw new Error(`API Error (${response.status}): ${errorData?.error?.message || response.statusText}`);
            }
            return await response.json();
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, delays[i]));
          }
        }
      };

      const handleAnalyzeAndFix = async () => {
        if (!apiKey.trim()) {
          setError("Please provide a Gemini API Key to use this service.");
          return;
        }
        if (!htmlInput.trim()) {
          setError("Please paste some HTML to analyze.");
          return;
        }

        setIsLoading(true);
        setError('');
        setGeneratedCss('');
        setCopied(false);
        setDetectedBreakpoint(null);
        setAnalysisExplanation('');

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`;
          
          const systemPrompt = `You are an expert frontend developer and WordPress CSS specialist. Your task is to analyze full website HTML, locate the navigation bar, estimate the screen width where it will overlap or break, and write responsive CSS to fix it.
          CRITICAL INSTRUCTION: The output CSS MUST be beautifully formatted, properly indented (using tabs or spaces), and use line breaks for optimal human readability. Do NOT minify the CSS.`;

          const userPrompt = `I have a WordPress site whose navigation bar overlaps or breaks on smaller screens. 
          
          Here is the HTML structure of the page/site:
          ${htmlInput}
          
          Please analyze this HTML.
          1. Find the primary navigation menu.
          2. Estimate the breakpoint (in pixels) where the menu items would likely start overlapping based on the number of items and text length.
          3. Provide a brief explanation of the issue and the solution.
          4. Write a CSS media query (@media (max-width: [breakpoint]px)) that targets the specific classes and IDs found in the HTML to fix the overlapping.
          
          Fix requirements:
          - Force horizontal menu items (like <ul> or flex containers) to stack vertically (e.g., flex-direction: column) or convert to a mobile menu layout.
          - Ensure links don't overflow the screen width.
          - Add high specificity if necessary.
          - Formatting: Structure the CSS neatly with proper line breaks and indentation. For example:
            @media screen and (max-width: 600px) {
                .menu-class {
                    flex-direction: column;
                }
            }`;

          const payload = {
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  estimatedBreakpoint: { type: "INTEGER", description: "The estimated pixel width where the menu breaks." },
                  analysisExplanation: { type: "STRING", description: "A short, 1-2 sentence explanation of the detected issue and how the CSS fixes it." },
                  cssCode: { type: "STRING", description: "The raw, nicely formatted and properly indented CSS media query to fix the overlapping. DO NOT use markdown blocks." }
                },
                required: ["estimatedBreakpoint", "analysisExplanation", "cssCode"]
              }
            }
          };

          const options = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          };

          const result = await fetchWithRetry(url, options);
          
          if (result.candidates && result.candidates[0] && result.candidates[0].content) {
            const responseData = JSON.parse(result.candidates[0].content.parts[0].text);
            setGeneratedCss(responseData.cssCode);
            setDetectedBreakpoint(responseData.estimatedBreakpoint);
            setAnalysisExplanation(responseData.analysisExplanation);
          } else {
            throw new Error("Invalid response format from analysis engine. Check your API key.");
          }

        } catch (err) {
          console.error(err);
          setError(err.message || "Failed to analyze and generate CSS. Please try again.");
        } finally {
          setIsLoading(false);
        }
      };

      const copyToClipboard = () => {
        if (!generatedCss) return;
        const textArea = document.createElement("textarea");
        textArea.value = generatedCss;
        textArea.style.position = "absolute";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        } catch (err) {
          setError("Failed to copy to clipboard. Please select the text and copy manually.");
        } finally {
          document.body.removeChild(textArea);
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-brand-white border-b border-brand-gray sticky top-0 z-10 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center space-x-2">
                  <div className="bg-brand-navy p-2 rounded-lg">
                    <LayoutTemplate className="h-6 w-6 text-brand-orange" />
                  </div>
                  <span className="text-xl font-bold text-brand-navy tracking-tight">
                    WP NavFixer
                  </span>
                </div>
                <div className="text-sm font-medium text-brand-navy opacity-70 hidden sm:block">
                  Responsive Navigation CSS Generator
                </div>
              </div>
            </div>
          </header>

          <main className="flex-grow max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 w-full">
            <div className="mb-10 max-w-3xl">
              <h1 className="text-3xl sm:text-4xl font-extrabold text-brand-black tracking-tight mb-4">
                Fix your overlapping WordPress menus in seconds.
              </h1>
              <p className="text-lg text-brand-black/70 mb-6">
                Paste the HTML of your problematic navigation bar below. Our AI will analyze your specific classes and structure to generate a custom CSS patch that makes it perfectly responsive on mobile and tablet screens.
              </p>
              
              {/* API Key Input Section */}
              <div className="bg-brand-white border border-brand-gray shadow-sm rounded-xl p-5 flex flex-col gap-4">
                <div className="flex flex-col sm:flex-row gap-4 items-start sm:items-center">
                  <div className="flex-grow w-full">
                    <label htmlFor="apiKey" className="block text-sm font-bold text-brand-navy flex items-center gap-2 mb-1.5">
                      <Key className="h-4 w-4 text-brand-orange" /> Gemini API Key (Required)
                    </label>
                    <input
                      type="password"
                      id="apiKey"
                      className="block w-full px-4 py-2 border border-brand-gray bg-brand-gray/30 rounded-lg shadow-inner focus:ring-2 focus:ring-brand-orange focus:border-brand-orange text-sm text-brand-black transition-all"
                      placeholder="AIzaSy..."
                      value={apiKey}
                      onChange={handleApiKeyChange}
                    />
                  </div>
                  <div className="text-xs text-brand-navy/70 sm:w-1/3 sm:pt-6">
                    Get a free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank" className="font-bold text-brand-orange hover:text-brand-navy transition-colors underline">Google AI Studio</a>.
                  </div>
                </div>
                
                {/* Remember Me Checkbox */}
                <div className="flex items-center gap-2">
                  <input
                    type="checkbox"
                    id="rememberMe"
                    className="h-4 w-4 text-brand-orange focus:ring-brand-orange border-brand-gray rounded cursor-pointer"
                    checked={rememberMe}
                    onChange={handleRememberMeToggle}
                  />
                  <label htmlFor="rememberMe" className="text-sm font-medium text-brand-navy cursor-pointer">
                    Remember API Key on this browser
                  </label>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
              
              {/* Step 1 Box */}
              <div className="bg-brand-white rounded-2xl shadow-sm border border-brand-gray overflow-hidden flex flex-col h-full">
                <div className="p-6 border-b border-brand-gray bg-[#f9f9f9]">
                  <h2 className="text-lg font-bold flex items-center gap-2 text-brand-navy">
                    <Code className="h-5 w-5 text-brand-orange" />
                    Step 1: Input Website HTML
                  </h2>
                  <p className="text-sm text-brand-black/60 mt-1">
                    Right-click your website's page, select "View Page Source" or "Inspect", and copy the HTML.
                  </p>
                </div>
                
                <div className="p-6 flex-grow flex flex-col gap-4">
                  <div className="flex flex-col flex-grow">
                    <label htmlFor="html-input" className="block text-sm font-bold text-brand-navy mb-2">
                      Full Website HTML Structure
                    </label>
                    <textarea
                      id="html-input"
                      className="flex-grow w-full rounded-xl border border-brand-gray bg-brand-gray/20 p-4 font-mono text-sm text-brand-black focus:ring-2 focus:ring-brand-orange focus:border-brand-orange resize-y min-h-[250px] shadow-inner transition-all"
                      value={htmlInput}
                      onChange={(e) => setHtmlInput(e.target.value)}
                      placeholder="<html>\n  <body>\n    <nav id='site-navigation'>...</nav>\n  </body>\n</html>"
                      spellCheck="false"
                    />
                  </div>

                  <div className="pt-4 mt-2 border-t border-brand-gray">
                    <button
                      onClick={handleAnalyzeAndFix}
                      disabled={isLoading}
                      className={`w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-brand-white ${
                        isLoading ? 'bg-brand-navy/60 cursor-not-allowed' : 'bg-brand-navy hover:bg-brand-black transition-all active:scale-[0.98]'
                      }`}
                    >
                      {isLoading ? (
                        <><Loader2 className="animate-spin -ml-1 mr-2 h-5 w-5 text-brand-white" /> Analyzing Structure...</>
                      ) : (
                        <>Analyze & Generate Fix <ArrowRight className="ml-2 h-4 w-4 text-brand-orange" /></>
                      )}
                    </button>
                    {error && (
                      <div className="mt-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg flex items-start gap-2 border border-red-100 font-medium">
                        <AlertCircle className="h-5 w-5 flex-shrink-0" />
                        <p>{error}</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* Step 2 Box */}
              <div className="bg-brand-white rounded-2xl shadow-sm border border-brand-gray overflow-hidden flex flex-col h-full">
                <div className="p-6 border-b border-brand-gray bg-[#f9f9f9] flex justify-between items-center">
                  <h2 className="text-lg font-bold flex items-center gap-2 text-brand-navy">
                    <Code className="h-5 w-5 text-brand-orange" />
                    Step 2: View & Apply Fix
                  </h2>
                  <div className="flex gap-2">
                    {generatedCss && (
                      <span className="inline-flex items-center rounded-full bg-brand-orange/20 px-3 py-1 text-xs font-bold text-brand-navy ring-1 ring-inset ring-brand-orange/40">
                        Fix Ready!
                      </span>
                    )}
                  </div>
                </div>

                <div className="p-4 sm:p-6 flex-grow flex flex-col overflow-y-auto">
                  {generatedCss ? (
                    <div className="flex flex-col gap-6 animate-in fade-in duration-500 w-full max-w-full">
                      
                      {/* Form Step 1: Diagnosis */}
                      <div className="bg-brand-white rounded-xl border border-brand-gray shadow-sm overflow-hidden">
                        <div className="bg-brand-gray/40 px-4 py-3 border-b border-brand-gray flex items-center gap-3">
                          <span className="bg-brand-navy text-brand-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">1</span>
                          <h3 className="font-bold text-brand-navy">Analysis & Diagnosis</h3>
                        </div>
                        <div className="p-4 sm:p-5">
                          <div className="grid grid-cols-2 gap-4 mb-4">
                            <div className="bg-brand-white rounded-lg p-3 sm:p-4 border border-brand-gray text-center sm:text-left shadow-sm">
                              <p className="text-xs text-brand-black/50 uppercase font-bold tracking-wider mb-1">Detected Breakpoint</p>
                              <p className="text-xl sm:text-2xl font-black text-brand-orange">~{detectedBreakpoint}px</p>
                            </div>
                            <div className="bg-brand-white rounded-lg p-3 sm:p-4 border border-brand-gray text-center sm:text-left shadow-sm">
                              <p className="text-xs text-brand-black/50 uppercase font-bold tracking-wider mb-1">Target CMS</p>
                              <p className="text-xl sm:text-2xl font-black text-brand-navy">WordPress</p>
                            </div>
                          </div>
                          <div className="bg-[#f9f9f9] p-4 rounded-lg border border-brand-gray text-sm text-brand-black/80 leading-relaxed font-medium">
                            <strong className="text-brand-navy block mb-1">AI Explanation:</strong> 
                            {analysisExplanation}
                          </div>
                        </div>
                      </div>

                      {/* Form Step 2: The Patch */}
                      <div className="bg-brand-white rounded-xl border border-brand-gray shadow-sm overflow-hidden flex flex-col">
                        <div className="bg-brand-gray/40 px-4 py-3 border-b border-brand-gray flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <span className="bg-brand-navy text-brand-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">2</span>
                            <h3 className="font-bold text-brand-navy">Generated CSS Patch</h3>
                          </div>
                          <button
                            onClick={copyToClipboard}
                            className={`inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-lg transition-colors shadow-sm ${
                              copied ? 'bg-brand-orange text-brand-navy border-brand-orange' : 'bg-brand-white text-brand-navy hover:bg-brand-gray border border-brand-gray'
                            }`}
                          >
                            {copied ? <CheckCircle className="h-3.5 w-3.5" /> : <Copy className="h-3.5 w-3.5" />}
                            {copied ? 'Copied!' : 'Copy Code'}
                          </button>
                        </div>
                        <div className="p-0 bg-brand-navy flex flex-col">
                          <textarea
                            readOnly
                            className="w-full bg-transparent font-mono text-sm text-brand-orange focus:outline-none resize-y min-h-[250px] p-5 shadow-inner"
                            value={generatedCss}
                          />
                        </div>
                      </div>

                      {/* Form Step 3: Implementation */}
                      <div className="bg-brand-white rounded-xl border border-brand-gray shadow-sm overflow-hidden">
                        <div className="bg-brand-gray/40 px-4 py-3 border-b border-brand-gray flex items-center gap-3">
                          <span className="bg-brand-navy text-brand-white text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">3</span>
                          <h3 className="font-bold text-brand-navy">How to Apply</h3>
                        </div>
                        <div className="p-4 sm:p-5 bg-brand-white">
                          <ol className="list-decimal list-inside space-y-2.5 text-sm text-brand-black/80 font-medium marker:text-brand-orange marker:font-black">
                            <li>Log in to your WordPress Dashboard.</li>
                            <li>Navigate to <strong className="text-brand-navy">Appearance &gt; Customize</strong>.</li>
                            <li>Click on <strong className="text-brand-navy">Additional CSS</strong> at the bottom of the left menu.</li>
                            <li>Paste the copied CSS code and click <strong className="text-brand-navy">Publish</strong>.</li>
                          </ol>
                        </div>
                      </div>

                    </div>
                  ) : (
                    <div className="flex-grow flex flex-col items-center justify-center text-center p-8 border-2 border-dashed border-brand-gray rounded-xl bg-brand-gray/10">
                      <div className="bg-brand-gray/50 p-4 rounded-full mb-4">
                        <Code className="h-8 w-8 text-brand-navy/30" />
                      </div>
                      <h3 className="text-sm font-bold text-brand-navy mb-1">No CSS Generated Yet</h3>
                      <p className="text-sm text-brand-black/60 max-w-xs mx-auto">
                        Paste your HTML on the left and click "Analyze & Generate Fix".
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </main>
          
          <footer className="mt-auto border-t border-brand-gray bg-brand-white">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center">
              <p className="text-sm font-bold text-brand-navy/50">Powered by AI generation • Fully Client-side</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
