<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WP NavFixer - Responsive Navigation Fixer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline SVG Icons (Replacing Lucide dependencies for standalone support) ---
    const Code = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
    const Smartphone = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;
    const Copy = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const CheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const AlertCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const Loader2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Info = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const LayoutTemplate = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="7" rx="2" ry="2"></rect><rect x="3" y="14" width="18" height="7" rx="2" ry="2"></rect></svg>;
    const ArrowRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
    const Key = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>;

    function App() {
      const [apiKey, setApiKey] = useState('');
      const [htmlInput, setHtmlInput] = useState(`<nav id="site-navigation" class="main-navigation">\n  <div class="nav-wrapper">\n    <a href="/" class="site-logo">MyWP Site</a>\n    <ul id="primary-menu" class="menu">\n      <li class="menu-item"><a href="/home">Home</a></li>\n      <li class="menu-item"><a href="/about">About Us</a></li>\n      <li class="menu-item"><a href="/services">Our Services</a></li>\n      <li class="menu-item"><a href="/portfolio">Portfolio</a></li>\n      <li class="menu-item"><a href="/blog">Blog</a></li>\n      <li class="menu-item"><a href="/contact">Contact</a></li>\n    </ul>\n  </div>\n</nav>`);
      const [breakpoint, setBreakpoint] = useState('768');
      const [generatedCss, setGeneratedCss] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');
      const [copied, setCopied] = useState(false);

      const fetchWithRetry = async (url, options, retries = 5) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) {
              const errorData = await response.json().catch(() => ({}));
              throw new Error(`API Error (${response.status}): ${errorData?.error?.message || response.statusText}`);
            }
            return await response.json();
          } catch (err) {
            if (i === retries - 1) throw err;
            await new Promise(r => setTimeout(r, delays[i]));
          }
        }
      };

      const handleAnalyzeAndFix = async () => {
        if (!apiKey.trim()) {
          setError("Please provide a Gemini API Key to use this service.");
          return;
        }
        if (!htmlInput.trim()) {
          setError("Please paste some HTML to analyze.");
          return;
        }

        setIsLoading(true);
        setError('');
        setGeneratedCss('');
        setCopied(false);

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey.trim()}`;
          
          const systemPrompt = `You are an expert frontend developer and WordPress CSS specialist. Your task is to analyze HTML snippets of navigation bars and write responsive CSS to fix overlapping issues on small screens. 
          CRITICAL INSTRUCTIONS: 
          1. Output ONLY raw, valid CSS code. 
          2. DO NOT wrap the output in markdown code blocks (e.g., no \`\`\`css or \`\`\`).
          3. DO NOT include any explanations, HTML, or conversational text. Just the CSS.`;

          const userPrompt = `I have a WordPress navigation bar that overlaps or breaks on smaller screens. 
          
          Here is the HTML structure of the navigation:
          ${htmlInput}
          
          The overlapping issues typically happen at screen sizes below ${breakpoint}px. 
          Please write a CSS media query (@media (max-width: ${breakpoint}px)) that targets the specific classes and IDs found in the HTML above.
          
          Fix requirements:
          - Force horizontal menu items (like <ul> or flex containers) to stack vertically (e.g., flex-direction: column).
          - Ensure links don't overflow the screen width (word-wrap or padding adjustments).
          - Make the layout clean and accessible for mobile users.
          - Add high specificity if necessary to override default WordPress themes.`;

          const payload = {
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
          };

          const options = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          };

          const result = await fetchWithRetry(url, options);
          
          if (result.candidates && result.candidates[0] && result.candidates[0].content) {
            let cssText = result.candidates[0].content.parts[0].text;
            cssText = cssText.replace(/```css\n?/gi, '').replace(/```\n?/gi, '').trim();
            setGeneratedCss(cssText);
          } else {
            throw new Error("Invalid response format from analysis engine. Check your API key.");
          }

        } catch (err) {
          console.error(err);
          setError(err.message || "Failed to analyze and generate CSS. Please try again.");
        } finally {
          setIsLoading(false);
        }
      };

      const copyToClipboard = () => {
        if (!generatedCss) return;
        const textArea = document.createElement("textarea");
        textArea.value = generatedCss;
        textArea.style.position = "absolute";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        } catch (err) {
          setError("Failed to copy to clipboard. Please select the text and copy manually.");
        } finally {
          document.body.removeChild(textArea);
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center space-x-2">
                  <div className="bg-indigo-600 p-2 rounded-lg">
                    <LayoutTemplate className="h-6 w-6 text-white" />
                  </div>
                  <span className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-500">
                    WP NavFixer
                  </span>
                </div>
                <div className="text-sm font-medium text-slate-500 hidden sm:block">
                  Responsive Navigation CSS Generator
                </div>
              </div>
            </div>
          </header>

          <main className="flex-grow max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 w-full">
            <div className="mb-10 max-w-3xl">
              <h1 className="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight mb-4">
                Fix your overlapping WordPress menus in seconds.
              </h1>
              <p className="text-lg text-slate-600 mb-6">
                Paste the HTML of your problematic navigation bar below. Our AI will analyze your specific classes and structure to generate a custom CSS patch that makes it perfectly responsive on mobile and tablet screens.
              </p>
              
              {/* API Key Input Section */}
              <div className="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex flex-col sm:flex-row gap-4 items-center">
                <div className="flex-grow w-full">
                  <label htmlFor="apiKey" className="block text-sm font-semibold text-indigo-900 flex items-center gap-2 mb-1.5">
                    <Key className="h-4 w-4" /> Gemini API Key (Required)
                  </label>
                  <input
                    type="password"
                    id="apiKey"
                    className="block w-full px-4 py-2 border border-indigo-200 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                    placeholder="AIzaSy..."
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                  />
                </div>
                <div className="text-xs text-indigo-700 sm:w-1/3">
                  Get a free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank" className="font-bold underline hover:text-indigo-900">Google AI Studio</a> to power the CSS generation. Your key stays in your browser.
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
                <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                  <h2 className="text-lg font-semibold flex items-center gap-2 text-slate-800">
                    <Code className="h-5 w-5 text-indigo-500" />
                    Step 1: Input Navigation HTML
                  </h2>
                  <p className="text-sm text-slate-500 mt-1">
                    Right-click your website's header, select "Inspect", and copy the Outer HTML of your <code>&lt;nav&gt;</code> element.
                  </p>
                </div>
                
                <div className="p-6 flex-grow flex flex-col gap-4">
                  <div className="flex flex-col flex-grow">
                    <label htmlFor="html-input" className="block text-sm font-medium text-slate-700 mb-2">
                      Navigation HTML Structure
                    </label>
                    <textarea
                      id="html-input"
                      className="flex-grow w-full rounded-xl border border-slate-300 p-4 font-mono text-sm text-slate-700 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-y min-h-[250px]"
                      value={htmlInput}
                      onChange={(e) => setHtmlInput(e.target.value)}
                      placeholder="<nav id='site-navigation'>...</nav>"
                      spellCheck="false"
                    />
                  </div>

                  <div>
                    <label htmlFor="breakpoint" className="block text-sm font-medium text-slate-700 mb-2">
                      Mobile Breakpoint (px)
                    </label>
                    <div className="relative rounded-md shadow-sm w-full sm:w-1/2">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Smartphone className="h-4 w-4 text-slate-400" />
                      </div>
                      <input
                        type="number"
                        id="breakpoint"
                        className="block w-full pl-10 pr-12 py-2.5 sm:text-sm border border-slate-300 rounded-xl focus:ring-indigo-500 focus:border-indigo-500"
                        value={breakpoint}
                        onChange={(e) => setBreakpoint(e.target.value)}
                      />
                      <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <span className="text-slate-500 sm:text-sm">px</span>
                      </div>
                    </div>
                  </div>

                  <div className="pt-4 mt-2 border-t border-slate-100">
                    <button
                      onClick={handleAnalyzeAndFix}
                      disabled={isLoading}
                      className={`w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white ${
                        isLoading ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-md transition-all active:scale-[0.98]'
                      }`}
                    >
                      {isLoading ? (
                        <><Loader2 className="animate-spin -ml-1 mr-2 h-5 w-5 text-white" /> Analyzing Structure...</>
                      ) : (
                        <>Analyze & Generate Fix <ArrowRight className="ml-2 h-4 w-4" /></>
                      )}
                    </button>
                    {error && (
                      <div className="mt-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg flex items-start gap-2 border border-red-100">
                        <AlertCircle className="h-5 w-5 flex-shrink-0" />
                        <p>{error}</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
                <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                  <h2 className="text-lg font-semibold flex items-center gap-2 text-slate-800">
                    <Code className="h-5 w-5 text-emerald-500" />
                    Step 2: Apply Custom CSS
                  </h2>
                  {generatedCss && (
                    <span className="inline-flex items-center rounded-full bg-emerald-50 px-2 py-1 text-xs font-medium text-emerald-700 ring-1 ring-inset ring-emerald-600/20">
                      Ready
                    </span>
                  )}
                </div>

                <div className="p-6 flex-grow flex flex-col">
                  {generatedCss ? (
                    <div className="flex flex-col h-full animate-in fade-in duration-500">
                      <div className="relative flex-grow flex flex-col">
                        <div className="absolute top-3 right-3 z-10">
                          <button
                            onClick={copyToClipboard}
                            className={`inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${
                              copied ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200' : 'bg-slate-100 text-slate-700 hover:bg-slate-200 border border-slate-200 hover:border-slate-300'
                            }`}
                          >
                            {copied ? <CheckCircle className="h-3.5 w-3.5" /> : <Copy className="h-3.5 w-3.5" />}
                            {copied ? 'Copied!' : 'Copy Code'}
                          </button>
                        </div>
                        <textarea
                          readOnly
                          className="flex-grow w-full rounded-xl bg-slate-900 border border-slate-800 p-5 pt-12 font-mono text-sm text-emerald-400 focus:outline-none resize-none shadow-inner min-h-[250px]"
                          value={generatedCss}
                        />
                      </div>

                      <div className="mt-6 bg-blue-50 border border-blue-100 rounded-xl p-4 flex gap-3 items-start">
                        <Info className="h-5 w-5 text-blue-600 flex-shrink-0 mt-0.5" />
                        <div className="text-sm text-blue-800">
                          <p className="font-semibold mb-1">How to apply this in WordPress:</p>
                          <ol className="list-decimal list-inside space-y-1 ml-1 marker:text-blue-500">
                            <li>Log in to your WordPress Dashboard.</li>
                            <li>Go to <strong>Appearance</strong> &gt; <strong>Customize</strong>.</li>
                            <li>Click on <strong>Additional CSS</strong>.</li>
                            <li>Paste the code above and click <strong>Publish</strong>.</li>
                          </ol>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="flex-grow flex flex-col items-center justify-center text-center p-8 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                      <div className="bg-slate-100 p-4 rounded-full mb-4">
                        <Code className="h-8 w-8 text-slate-400" />
                      </div>
                      <h3 className="text-sm font-medium text-slate-900 mb-1">No CSS Generated Yet</h3>
                      <p className="text-sm text-slate-500 max-w-xs mx-auto">
                        Paste your HTML on the left and click "Analyze & Generate Fix".
                      </p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </main>
          
          <footer className="mt-auto border-t border-slate-200 bg-white">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center">
              <p className="text-sm text-slate-500">Powered by AI generation • Fully Client-side</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
